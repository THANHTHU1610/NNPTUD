<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Products Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <style>
      table tbody tr {
        transition: 0.2s;
        cursor: pointer;
      }
      table tbody tr:hover {
        background-color: #f8f9fa;
        transform: scale(1.003);
      }
    </style>
  </head>
  <body>
    <div class="container my-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-4"><i class="bi bi-box-seam"></i> Products Dashboard</h2>

        <div>
          <button id="exportBtn" class="btn btn-success">
            <i class="bi bi-file-earmark-arrow-down"></i> Export CSV
          </button>

          <button class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Create
          </button>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4 mb-2">
          <input
            id="searchInput"
            class="form-control"
            placeholder="🔍 Search by title..."
          />
        </div>
        <div class="col-md-2 mb-2">
          <select id="pageSize" class="form-select">
            <option value="5">5 per page</option>
            <option value="10" selected>10 per page</option>
            <option value="20">20 per page</option>
          </select>
        </div>
      </div>

      <div class="table-responsive">
        <table id="productsTable" class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th
                id="sortTitle"
                onclick="sortBy('title')"
                style="cursor: pointer"
              >
                <i class="bi bi-fonts"></i> Title
              </th>
              <th
                id="sortPrice"
                onclick="sortBy('price')"
                style="cursor: pointer"
              >
                <i class="bi bi-cash-coin"></i> Price
              </th>
              <th><i class="bi bi-tags"></i> Category</th>
              <th><i class="bi bi-image"></i> Image</th>
            </tr>
          </thead>

          <tbody></tbody>
        </table>
      </div>

      <nav>
        <ul id="pagination" class="pagination"></ul>
      </nav>
    </div>

    <!-- Detail / Edit Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 id="detailTitle" class="modal-title">Product Detail</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="detailForm">
              <input type="hidden" id="detailId" />
              <div class="mb-3">
                <label class="form-label">Title</label>
                <input id="detailTitleInput" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Price</label>
                <input
                  id="detailPriceInput"
                  type="number"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea
                  id="detailDescInput"
                  class="form-control"
                  rows="3"
                ></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">Category ID</label>
                <input
                  id="detailCategoryInput"
                  type="number"
                  class="form-control"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input id="detailImageInput" class="form-control" />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button id="saveDetailBtn" class="btn btn-primary">Save</button>
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Create Modal -->
    <div class="modal fade" id="createModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Create Product</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="createForm">
              <div class="mb-3">
                <label class="form-label">Title</label>
                <input id="createTitle" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Price</label>
                <input
                  id="createPrice"
                  type="number"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea
                  id="createDescription"
                  class="form-control"
                  rows="3"
                ></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">Category ID</label>
                <input
                  id="createCategoryId"
                  type="number"
                  class="form-control"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input id="createImage" class="form-control" />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button id="createSubmit" class="btn btn-success">Create</button>
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
